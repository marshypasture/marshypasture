<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#3b82f6" />
    <title>ozdagifer</title>
    <meta
      name="description"
      content="ozdagifer — girly blue reactions, memes, and perfectly timed loops."
    />
    <meta property="og:title" content="ozdagifer" />
    <meta
      property="og:description"
      content="ozdagifer — girly blue reactions, memes, and perfectly timed loops."
    />
    <meta
      property="og:image"
      content="https://media.giphy.com/avatars/ozdagifer/no1VJDcnorBc/200h.png"
    />
    <link
      rel="icon"
      href="https://media.giphy.com/avatars/ozdagifer/no1VJDcnorBc/200h.png"
      type="image/png"
    />
    <link
      rel="apple-touch-icon"
      href="https://media.giphy.com/avatars/ozdagifer/no1VJDcnorBc/200h.png"
    />
    <link
      rel="icon"
      href="https://media.giphy.com/avatars/ozdagifer/no1VJDcnorBc/200h.png"
      type="image/png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="wrap top__inner">
        <a class="brand" href="./" aria-label="Home">
          <span class="brand__text">ozdagifer</span>
        </a>

        <div class="top__nav" aria-label="Links">
          <a
            class="pill pill--ghost"
            href="https://www.instagram.com/ozdagifer/"
            target="_blank"
            rel="noreferrer"
            >Instagram</a
          >
          <a
            class="pill pill--ghost"
            href="https://x.com/ozdagifer"
            target="_blank"
            rel="noreferrer"
            >X</a
          >
          <a
            class="pill"
            href="https://giphy.com/channel/ozdagifer"
            target="_blank"
            rel="noreferrer"
            >GIPHY Channel</a
          >
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="homeGrid">
        <section class="heroCard" aria-label="Intro">
          <div class="heroCard__inner">
            <h1 class="hero__title">ozdagifer</h1>
            <img
              class="hero__logo"
              src="https://scontent.cdninstagram.com/v/t51.82787-19/658431258_18069686921312845_4183453006961826053_n.jpg?stp=dst-jpg_s150x150_tt6&_nc_cat=111&ccb=7-5&_nc_sid=f7ccc5&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLnd3dy4yNTYuQzMifQ%3D%3D&_nc_ohc=Ilgs5cCYtb8Q7kNvwFHUI1h&_nc_oc=AdpPIRzpGgfzUmQrHaVz2G4JDPa8qPBgD3tGJqusXKWbbSEk8tWFeTOHjUJU-htZ3aY&_nc_zt=24&_nc_ht=scontent.cdninstagram.com&_nc_gid=osmA8moZtHO6svNw_y3dVg&_nc_ss=7a32e&oh=00_AfzID8vQaoJtdoaLByTUIs88l22jILZ4rXkLg1ZZOMP-Wg&oe=69C9B1BF"
              alt="ozdagifer logo"
              loading="eager"
              decoding="async"
            />
            <p class="hero__subtitle">Starting a fresh GIF set. Add new ones and reload.</p>

            <div class="heroCard__actions">
              <button class="btn btn--main" id="openSuggest" type="button">Request a GIF</button>
              <a
                class="btn btn--ghost btn--giphy"
                href="https://giphy.com/channel/ozdagifer"
                target="_blank"
                rel="noreferrer"
                aria-label="Open GIPHY channel"
              >
                Open GIPHY
              </a>
            </div>
          </div>
        </section>

        <section class="vaultStage" aria-label="Gallery">
          <div class="vaultStage__head">
            <div>
              <div class="vaultStage__eyebrow">GIF VAULT</div>
              <h2 class="vaultStage__title">Fresh Drop</h2>
            </div>
            <div class="vaultStage__meta" id="metaText">Loading…</div>
          </div>

          <div id="error" class="error" hidden></div>
          <div id="gallery" class="gallery gallery--masonry" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="wrap footer__inner">
        <div class="muted">
          <a href="https://giphy.com/channel/ozdagifer" target="_blank" rel="noreferrer">GIPHY</a>
          <span class="footer__sep" aria-hidden="true">·</span>
          <a href="https://www.instagram.com/ozdagifer/" target="_blank" rel="noreferrer">Instagram</a>
          <span class="footer__sep" aria-hidden="true">·</span>
          <a href="https://x.com/ozdagifer" target="_blank" rel="noreferrer">X</a>
        </div>
      </div>
    </footer>

    <div class="modal" id="modal" hidden aria-hidden="true">
      <div class="modal__backdrop" data-close="true"></div>
      <div class="modal__card" role="dialog" aria-modal="true" aria-label="GIF viewer">
        <button class="iconBtn modal__close" type="button" aria-label="Close" data-close="true">
          ✕
        </button>
        <div class="modal__media">
          <img id="modalImg" alt="" />
        </div>
        <div class="modal__body">
          <div class="modal__title" id="modalTitle">—</div>
          <div class="modal__actions">
            <a class="btn" id="openOnGiphy" href="#" target="_blank" rel="noreferrer">Open on GIPHY</a>
            <button class="btn btn--ghost" id="copyLink" type="button">Copy link</button>
          </div>
          <div class="muted mono" id="modalUrl">—</div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" hidden role="status" aria-live="polite"></div>

    <button class="shareFab" id="shareFab" type="button" aria-label="Share">
      Share
    </button>

    <div class="modal" id="suggestModal" hidden aria-hidden="true">
      <div class="modal__backdrop" data-close="true"></div>
      <div
        class="modal__card modal__card--small"
        role="dialog"
        aria-modal="true"
        aria-label="Suggestion form"
      >
        <button
          class="iconBtn modal__close"
          type="button"
          aria-label="Close"
          data-close="true"
        >
          ✕
        </button>
        <div class="modal__body">
          <div class="modal__title">Request a Reaction</div>
          <p class="muted" style="margin: 8px 0 0">
            Have a moment that needs to be a GIF? Let me know!
          </p>

          <form id="suggestForm" class="suggestModal__form" autocomplete="off">
            <label class="field">
              <span class="field__label">Name</span>
              <input class="input" name="name" placeholder="Your name" />
            </label>
            <label class="field">
              <span class="field__label">Email</span>
              <input class="input" name="email" type="email" placeholder="you@example.com" />
            </label>
            <label class="field">
              <span class="field__label">Message</span>
              <textarea
                class="input input--area"
                name="message"
                required
                placeholder="What reaction moment do you need?"
                rows="4"
              ></textarea>
            </label>
            <button class="btn" id="suggestSubmit" type="submit">Send Request</button>
          </form>
        </div>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
